<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- CRT screen background -->
  <rect width="64" height="64" fill="#0a0e0a"/>
  <!-- Screen border (Pip-Boy green) -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#1BFF80" stroke-width="3"/>
  <!-- Inner screen area -->
  <rect x="6" y="6" width="52" height="52" fill="#0a0e0a"/>
  <!-- Scanline hints -->
  <rect x="6" y="10" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="14" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="18" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="22" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="26" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="30" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="34" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="38" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="42" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="46" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="50" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <rect x="6" y="54" width="52" height="1" fill="#1BFF80" opacity="0.06"/>
  <!-- Vault Boy simplified: head -->
  <rect x="27" y="10" width="10" height="8" fill="#1BFF80"/>
  <!-- Hair -->
  <rect x="26" y="8" width="12" height="3" fill="#1BFF80"/>
  <rect x="29" y="6" width="6" height="3" fill="#1BFF80"/>
  <!-- Body -->
  <rect x="29" y="18" width="6" height="10" fill="#1BFF80"/>
  <!-- Arms (thumbs up pose) -->
  <rect x="22" y="18" width="7" height="3" fill="#1BFF80"/>
  <rect x="35" y="18" width="7" height="3" fill="#1BFF80"/>
  <!-- Right arm up (thumbs up!) -->
  <rect x="40" y="12" width="3" height="9" fill="#1BFF80"/>
  <rect x="39" y="10" width="5" height="3" fill="#1BFF80"/>
  <!-- Left arm down -->
  <rect x="20" y="20" width="3" height="5" fill="#1BFF80"/>
  <!-- Legs -->
  <rect x="29" y="28" width="3" height="8" fill="#1BFF80"/>
  <rect x="33" y="28" width="3" height="8" fill="#1BFF80"/>
  <!-- Feet -->
  <rect x="27" y="35" width="5" height="2" fill="#1BFF80"/>
  <rect x="33" y="35" width="5" height="2" fill="#1BFF80"/>
  <!-- "> 0xMux" text line at bottom -->
  <rect x="10" y="44" width="3" height="3" fill="#1BFF80"/>
  <rect x="15" y="44" width="34" height="3" fill="#1BFF80" opacity="0.5"/>
  <!-- Cursor -->
  <rect x="50" y="44" width="3" height="3" fill="#1BFF80"/>
  <!-- Vignette corners -->
  <rect x="2" y="2" width="6" height="6" fill="#000000" opacity="0.4"/>
  <rect x="56" y="2" width="6" height="6" fill="#000000" opacity="0.4"/>
  <rect x="2" y="56" width="6" height="6" fill="#000000" opacity="0.4"/>
  <rect x="56" y="56" width="6" height="6" fill="#000000" opacity="0.4"/>
</svg>
